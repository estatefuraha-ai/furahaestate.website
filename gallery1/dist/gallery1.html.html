  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Furaha Airbnb Gallery</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="gallery">

    <h1>Our One Bedroom Apartment Gallery</h1>

    <p>Discover every corner of Furaha Estate</p>

    <div class="gallery-container">

        <div class="gallery-item">
            <img src="https://i.postimg.cc/ht45TTqC/Chat-GPT-Image-Jun-5-2026-09-32-06-AM.png" alt="Living Room">
            <div class="overlay">
                <h3>Living Room</h3>
            </div>
        </div>

        <div class="gallery-item">
            <img src="https://i.postimg.cc/mDKvSDSM/Chat-GPT-Image-Jun-13-2026-01-33-26-AM.png" alt="Bedroom">
            <div class="overlay">
                <h3>Bedroom</h3>
            </div>
        </div>

        <div class="gallery-item">
            <img src="https://i.postimg.cc/jdpypwW4/7a392ef1ecb4f4c4a6e421f4e5d473e4-4x.jpg" alt="Kitchen">
            <div class="overlay">
                <h3>Kitchen</h3>
            </div>
        </div>

        <div class="gallery-item">
            <img src="https://i.postimg.cc/jjhNNgz0/Chat-GPT-Image-Jul-7-2026-12-00-33-AM.png" alt="Dining">
            <div class="overlay">
                <h3>Dining Nook</h3>
            </div>
        </div>

        <div class="gallery-item">
            <img src="https://i.postimg.cc/GhGgsRS0/Chat-GPT-Image-Jul-7-2026-01-15-50-AM.png" alt="Bathroom">
            <div class="overlay">
                <h3>Bathroom</h3>
            </div>
        </div>

        <div class="gallery-item">
            <img src="https://i.postimg.cc/CKJBdZgp/Chat-GPT-Image-Jul-6-2026-11-33-10-PM.png" alt="Balcony">
            <div class="overlay">
                <h3>Balcony</h3>
            </div>
        </div>

    </div>

</section>

<!-- Lightbox -->

<div class="lightbox" id="lightbox">

    <span class="close">&times;</span>

    <button class="lightbox-btn prev" id="prevBtn">
        &#10094;
    </button>

    <img id="lightbox-img" src="" alt="">

    <button class="lightbox-btn next" id="nextBtn">
        &#10095;
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
    <script  src="./script.js"></script>

  </body>
