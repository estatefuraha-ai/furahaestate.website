  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Furaha Estate Booking</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#F8F6F0;color:#fff}
.container{max-width:1100px;margin:auto;padding:30px;background:#FFFEFA;display:grid;grid-template-columns:1.4fr 1fr;gap:30px}
@media(max-width:800px){.container{grid-template-columns:1fr}}
img#main{width:100%;height:420px;object-fit:cover;border-radius:10px}
.thumbs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px}
.thumbs img{width:100%;height:90px;object-fit:cover;border-radius:6px;cursor:pointer}
.card{background:#8686AF;padding:20px;border-radius:10px}
input,select,textarea,button{width:90%;padding:12px;margin:8px 0;border-radius:6px;border:none}
button{background:#f2c94c;font-weight:bold;cursor:pointer}
h1{color:#f2c94c}
</style>
</head>
<body>
<div class="container">
<div>
<img id="main" src="https://i.postimg.cc/W100TNrQ/img-3-4x-4x.jpg">
<div class="thumbs">
<img src="https://i.postimg.cc/W100TNrQ/img-3-4x-4x.jpg">
<img src="https://i.postimg.cc/rFB5B0df/921cb8df239b97286370e1f6f8180693.jpg">
<img src="https://i.postimg.cc/jdpypwW4/7a392ef1ecb4f4c4a6e421f4e5d473e4-4x.jpg">
<img src="https://i.postimg.cc/GhGgsRS0/Chat-GPT-Image-Jul-7-2026-01-15-50-AM.png">
</div>
</div>
<div class="card">
<h1>Reserve Your Stay</h1>
<h2>Luxury One Bedroom Apartment</h2>
<h3>100K/Night</h3>
<form id="bookingForm">
<input id="name" placeholder="Full Name" required>
<input id="phone" placeholder="Phone Number" required>
<input id="email" type="email" placeholder="Email" required>
<label>Check-in</label><input id="checkin" type="date" required>
<label>Check-out</label><input id="checkout" type="date" required>
<select id="guests"><option>1 Guest</option><option>2 Guests</option><option>3 Guests</option><option>4 Guests</option></select>
<textarea id="message" placeholder="Special Requests"></textarea>
<button type="submit">Book via WhatsApp</button>
</form>
</div>
</div>
<script>
document.querySelectorAll(".thumbs img").forEach(img=>{
 img.onclick=()=>document.getElementById("main").src=img.src;
});
document.getElementById("bookingForm").addEventListener("submit",function(e){
e.preventDefault();
const g=id=>document.getElementById(id).value;
const text=`Hello Furaha Estate,

I would like to book an apartment.

Name: ${g("name")}
Phone: ${g("phone")}
Email: ${g("email")}
Check-in: ${g("checkin")}
Check-out: ${g("checkout")}
Guests: ${g("guests")}

Special Request:
${g("message")}`;
const url="https://wa.me/255719054077?text="+encodeURIComponent(text);
window.open(url,"_blank");
});
</script>
  <script type="module" src="js/firebase.js"></script>
<script type="module" src="js/booking.js"></script>
</body>
</html>
    <script type="module" src="./script.js"></script>

  </body>
  
</html>
