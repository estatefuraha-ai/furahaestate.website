<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Furaha Estate Booking</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#F8F6F0;color:#fff;}
.container{max-width:1100px;margin:auto;padding:30px;display:grid;grid-template-columns:1.4fr 1fr;gap:30px}
@media(max-width:800px){.container{grid-template-columns:1fr}}
img#main{width:100%;height:420px;object-fit:cover;border-radius:10px}
.thumbs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px}
.thumbs img{width:100%;height:90px;object-fit:cover;border-radius:6px;cursor:pointer}
.card{background:#8686AF;padding:20px;border-radius:10px}
input,select,textarea,button{width:100%;padding:12px;margin:8px 0;border-radius:6px;border:none}
h1{color:#f2c94c}
.button-group{
    display:flex;
    gap:15px;
    margin-top:20px;
}

.button-group button{
    flex:1;
    padding:15px;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    color:white;
}

button[value="email"]{
    background:#007BFF;
}

button[value="email"]:hover{
    background:#0056b3;
}

button[value="whatsapp"]{
    background:#25D366;
}

button[value="whatsapp"]:hover{
    background:#1da851;
}
</style>
</head>
<body>
<<div class="container">
<div>
<img id="main" src="https://i.postimg.cc/W100TNrQ/img-3-4x-4x.jpg">
<div class="thumbs">
<img src="https://i.postimg.cc/W100TNrQ/img-3-4x-4x.jpg">
<img src="https://i.postimg.cc/rFB5B0df/921cb8df239b97286370e1f6f8180693.jpg">
<img src="https://i.postimg.cc/jdpypwW4/7a392ef1ecb4f4c4a6e421f4e5d473e4-4x.jpg">
<img src="https://i.postimg.cc/GhGgsRS0/Chat-GPT-Image-Jul-7-2026-01-15-50-AM.png">
</div>
</div>
<div class="card">
<h1>Reserve Your Stay</h1>
<h2>Luxury Two Bedroom Apartment</h2>
<h3>TZS 70,000 | $27 per night</h3>
<form id="bookingForm">
<input id="name" placeholder="Full Name" required>
<input id="phone" placeholder="Phone Number" required>
<input id="email" type="email" placeholder="Email" required>
<label>Apartment</label>
<select id="apartment" required>
<option value="">Select Apartment</option>
<option>One Room Apartment</option>
</select>
<label>Check-in</label><input id="checkin" type="date" required>
<label>Check-out</label><input id="checkout" type="date" required>
<select id="guests"><option>1 Guest</option><option>2 Guests</option><option>3 Guests</option><option>4 Guests</option></select>
<textarea id="message" placeholder="Special Requests"></textarea>
<div class="button-group">

    <button id="emailBtn" type="submit" name="action" value="email">
        📧 Book via Email
    </button>

    <button id="whatsappBtn" type="submit" name="action" value="whatsapp">
        💬 Book via WhatsApp
    </button>

</div>

</form>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="script.js"></script>
</body>
  
</html>
