  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>

    <link rel="stylesheet" href="style.css">

    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>

<body>

<section class="contact">

    <form id="contactForm">

        <h2>Contact Us</h2>

        <input
            type="text"
            id="name"
            placeholder="Your Name"
            required
        >

        <input
            type="email"
            id="email"
            placeholder="Your Email"
            required
        >

        <input
            type="text"
            id="subject"
            placeholder="Subject"
            required
        >

        <textarea
            id="message"
            placeholder="Write your message..."
            rows="6"
            required
        ></textarea>

        <button type="submit">
            Send Message
        </button>

    </form>

</section>

<p id="status"></p>

</body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
