  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Furaha Airbnb Gallery</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="gallery">

    <h1>Our Two Bedroom Apartment Gallery</h1>

    <p>Discover every corner of Furaha Estate</p>

    <div class="gallery-container">

        <div class="gallery-item">
            <img src="https://i.postimg.cc/Tws7X4L6/Chat-GPT-Image-Jun-13-2026-01-59-03-AM.png" alt="Living Room">
            <div class="overlay">
                <h3>Living Room</h3>
            </div>
        </div>

        <div class="gallery-item">
            <img src="https://i.postimg.cc/dVngxn9x/Jun-13-2026-01-10-11-AM.png" alt="Bedroom">
            <div class="overlay">
                <h3>Bedrooms</h3>
            </div>
        </div>

        <div class="gallery-item">
            <img src="https://i.postimg.cc/MTpB7146/generated-image-(6).png" alt="Kitchen">
            <div class="overlay">
                <h3>Kitchen</h3>
            </div>
        </div>

        <div class="gallery-item">
            <img src="https://i.postimg.cc/Mp7j2P3T/Chat-GPT-Image-Jul-6-2026-11-42-46-PM.png" alt="Dining">
            <div class="overlay">
                <h3>Dining Nook</h3>
            </div>
        </div>

        <div class="gallery-item">
            <img src="https://i.postimg.cc/NfRcp1S9/Chat-GPT-Image-Jun-13-2026-01-47-48-AM.png" alt="Bathroom">
            <div class="overlay">
                <h3>Bathrooms</h3>
            </div>
        </div>

        <div class="gallery-item">
            <img src="https://i.postimg.cc/pTGFcmGD/Chat-GPT-Image-Jul-6-2026-11-57-59-PM.png" alt="Balcony">
            <div class="overlay">
                <h3>Balcony</h3>
            </div>
        </div>

    </div>

</section>

<!-- Lightbox -->

<div class="lightbox" id="lightbox">

    <span class="close">&times;</span>

    <img id="lightbox-img">

</div>

<script src="script.js"></script>

</body>
